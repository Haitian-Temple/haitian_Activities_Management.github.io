<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 關鍵設定：讓頁面在各種裝置上滿版且正確縮放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>主頁面</title>
    <style>
        /* 全域樣式：徹底消除邊距，確保滿版 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #f0f0f0; /* 背景色，當嵌入內容載入前顯示 */
            overflow: hidden; /* 防止頁面本身出現捲軸，捲軸由 iframe 內部處理 */
        }
        /* 嵌入容器：使用 flex 確保 iframe 能填滿剩餘高度，避免版面問題 */
        .embed-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        /* 可選的簡潔標題列，方便長輩識別 */
        .simple-header {
            padding: 12px 15px;
            background-color: #2c3e50;
            color: white;
            font-size: 1.5rem;  /* 相對單位，根據裝置調整，字體夠大 */
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            flex-shrink: 0; /* 防止標題列被壓縮 */
            -webkit-user-select: none; /* 防止選取 */
            user-select: none;
        }
        /* iframe 設定：滿版填滿剩餘空間 */
        .embed-container iframe {
            width: 100%;
            flex: 1;  /* 佔據所有剩餘空間 */
            border: none; /* 移除邊框 */
            background-color: white; /* 與內部背景一致，避免閃爍 */
        }
        /* 針對電腦版或橫向平板，可設定最大寬度保持舒適閱讀 (非滿版但維持比例) */
        @media (min-width: 1024px) {
            body {
                display: flex;
                justify-content: center;
                background-color: #e0e0e0; /* 外圍背景色 */
            }
            .embed-container {
                max-width: 1200px; /* 電腦版最大寬度，避免過寬不舒適 */
                height: 100%;
                box-shadow: 0 0 20px rgba(0,0,0,0.1);
            }
        }
        /* 簡單的載入提示，直到 iframe 載入完成 */
        .loading-tip {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #555;
            background: rgba(255,255,255,0.9);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 10;
            pointer-events: none; /* 讓點擊穿透到 iframe */
            opacity: 0;
            transition: opacity 0.3s;
        }
        .loading-tip.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="embed-container">
        <!-- 簡單標題列，字體大且清楚，長輩一目了然 -->
        <div class="simple-header">📋 主要服務頁面</div>
        <!-- 嵌入您的第一個 Google Apps Script 網頁 -->
        <iframe 
            id="mainFrame"
            src="https://script.google.com/macros/s/AKfycbwH0e1UNZ7ZJH34Onfdq-GWrWlhh7vKj9LO-l-HFAMxinvrynb3CBpUgaVnNsMdDbY/exec"
            title="主要服務內容"
            loading="lazy" <!-- 啟用延遲載入，提升效能 -->
            importance="high" <!-- 高優先級載入 -->
            sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-modals allow-downloads" <!-- 安全限制，但仍允許必要功能，可依實際需求調整 -->
            referrerpolicy="strict-origin-when-cross-origin"
            >
        </iframe>
    </div>
    
    <!-- 簡單的載入提示，載入後消失 (用 JavaScript 控制) -->
    <div class="loading-tip" id="loadingTip">載入中，請稍後...</div>

    <script>
        (function() {
            "use strict";
            
            // 1. 防止複製、剪下、貼上等操作 (符合資安直覺，但長輩仍可正常瀏覽)
            document.addEventListener('copy', (e) => e.preventDefault());
            document.addEventListener('cut', (e) => e.preventDefault());
            document.addEventListener('paste', (e) => e.preventDefault());
            // 防止選取文字 (可選，為了避免誤觸複製，但可能影響閱讀選取，長輩較少使用，可註解)
            // document.addEventListener('selectstart', (e) => e.preventDefault());

            // 2. 防止右鍵選單 (避免查看原始碼或複製)
            document.addEventListener('contextmenu', (e) => e.preventDefault());

            // 3. 載入提示管理：當 iframe 載入完成後淡出提示
            const iframe = document.getElementById('mainFrame');
            const loadingTip = document.getElementById('loadingTip');
            
            if (iframe && loadingTip) {
                // 顯示提示
                loadingTip.classList.add('show');
                
                // 監聽 iframe 載入事件
                iframe.addEventListener('load', function() {
                    // 稍微延遲一下確保內容呈現
                    setTimeout(() => {
                        loadingTip.classList.remove('show');
                    }, 300);
                });
                
                // 錯誤處理：如果載入失敗，顯示友善訊息
                iframe.addEventListener('error', function() {
                    loadingTip.textContent = '頁面載入失敗，請檢查網路或聯繫管理員';
                    loadingTip.style.color = '#c0392b';
                });
            }

            // 4. 確保在 Line 或其他 App 內瀏覽器也能正確縮放 (可選：但已經在 meta 設定)
            // 5. 雙擊縮放維持啟用 (對長輩友善)，但若您仍想限制縮放，可調整 meta 的 maximum-scale 為 1.0
            //   目前設定為 3.0，允許適度放大，長輩看得更清楚。
            
            // 6. 記憶體優化：若頁面隱藏，可暫停 iframe 活動? 此處不實作以免複雜。
        })();
    </script>
</body>
</html>
